<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Universal Systems</title>
    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        if (theme === "dark") {
          document.addEventListener("DOMContentLoaded", function () {
            document.body.classList.add("dark");
          });
        }
      })();
    </script>
    <link rel="stylesheet" href="/admin/style.css" />
    <style>
      .password-wrapper {
        position: relative;
      }
      .password-wrapper input {
        width: 100%;
        padding-right: 40px;
      }
      .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 16px;
        opacity: 0.7;
      }
      .toggle-password:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body data-page="login">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-intro-panel">
          <p class="booking-eyebrow">ADMIN ACCESS</p>
          <div class="login-brand-row">
            <img src="assets/logo-full.png" alt="Universal Systems logo" class="logo login-logo" />
          </div>
          <p>
            Sign in to manage service requests, track internal booking costs, export reports, and
            monitor booking status for Universal Systems in Mettur Dam.
          </p>
          <a class="secondary-btn" href="/">Back to booking page</a>
        </div>

        <form id="loginForm" class="login-form-panel">
          <label>
            <span>Username</span>
            <input type="text" name="username" placeholder="Enter username" required />
          </label>
          <label>
            <span>Password</span>
            <div class="password-wrapper">
              <input type="password" id="password" name="password" placeholder="Enter password" required />
              <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
          </label>
          <button type="submit" class="primary-btn">Login</button>
          <p class="login-note">Authorized staff access only.</p>
        </form>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="/admin/app.js"></script>
  </body>
</html>
